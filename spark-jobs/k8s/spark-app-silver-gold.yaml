apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: silver-to-gold
  namespace: default
spec:
  type: Python
  mode: cluster
  image: "asia-southeast1-docker.pkg.dev/my-project-lakehouse-k8s/data-platform-repo/spark-jobs:latest"
  imagePullPolicy: Always
  mainApplicationFile: "local:///app/silver_to_gold.py"
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  hadoopConf:
    "fs.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem"
    "fs.AbstractFileSystem.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem"
  driver:
    cores: 1
    coreLimit: "1200m"
    memory: "512m"
    labels:
      version: 3.4.0
    serviceAccount: spark-sa
    env:
      - name: SILVER_BUCKET
        value: "my-project-lakehouse-k8s-lake-silver"
      - name: GOLD_BUCKET
        value: "my-project-lakehouse-k8s-lake-gold"
  executor:
    cores: 1
    instances: 1
    memory: "512m"
    labels:
      version: 3.4.0
    env:
      - name: SILVER_BUCKET
        value: "my-project-lakehouse-k8s-lake-silver"
      - name: GOLD_BUCKET
        value: "my-project-lakehouse-k8s-lake-gold"
